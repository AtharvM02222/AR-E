<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Enterprise — Next-Gen Robotics</title>
  <meta name="description" content="AR Enterprise — Competition-grade robots, drones and RC kits. Built for builders who demand excellence.">
  <meta name="theme-color" content="#000000">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════════
       RESET & BASE
       ═══════════════════════════════════════════════════ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      cursor: none;
    }

    /* ═══════════════════════════════════════════════════
       CUSTOM CURSOR
       ═══════════════════════════════════════════════════ */
    .cursor-ring {
      position: fixed;
      width: 40px;
      height: 40px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: width 0.2s, height 0.2s, border-color 0.2s;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
    }

    .cursor-dot {
      position: fixed;
      width: 6px;
      height: 6px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }

    /* ═══════════════════════════════════════════════════
       LOADING SCREEN
       ═══════════════════════════════════════════════════ */
    .loader {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                  visibility 0.8s;
    }

    .loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-text {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    .loader-bar {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, transparent, #fff, transparent);
      animation: loader-fill 2.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes loader-fill {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    /* ═══════════════════════════════════════════════════
       SCENE CONTAINER
       ═══════════════════════════════════════════════════ */
    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #030308;
    }

    /* Subtle noise texture overlay */
    .scene::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 5;
      opacity: 0.025;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ═══════════════════════════════════════════════════
       GIANT TEXT — "AR ENTERPRISE"
       ═══════════════════════════════════════════════════ */
    .text-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      padding-top: 5vh;
    }

    .hero-text {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.88;
      text-align: center;
      color: #fff;
      position: relative;
      opacity: 0;
      animation: text-reveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) 2.6s forwards;
      user-select: none;
    }

    .hero-text .line-1 {
      font-size: clamp(80px, 16vw, 240px);
      display: block;
      letter-spacing: -4px;
      position: relative;
    }

    .hero-text .line-2 {
      font-size: clamp(30px, 5.5vw, 80px);
      display: block;
      position: relative;
      letter-spacing: 16px;
      margin-top: 0px;
      font-weight: 700;
    }

    @keyframes text-reveal {
      0% {
        opacity: 0;
        transform: translateY(50px);
        filter: blur(12px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    /* Glitch effect layers */
    .glitch-wrap {
      position: relative;
      display: inline-block;
    }

    .glitch-copy {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      text-transform: uppercase;
      text-align: center;
      color: #fff;
      pointer-events: none;
    }

    .glitch-copy.g1 {
      animation: glitch-1 6s infinite;
      clip-path: inset(0 0 65% 0);
      color: rgba(255,255,255,0.06);
    }

    .glitch-copy.g2 {
      animation: glitch-2 5s infinite;
      clip-path: inset(65% 0 0 0);
      color: rgba(255,255,255,0.04);
    }

    @keyframes glitch-1 {
      0%, 92% { transform: translate(0); }
      93% { transform: translate(-5px, -2px) skewX(-1deg); }
      94% { transform: translate(3px, 1px); }
      95% { transform: translate(-2px, -3px) skewX(0.5deg); }
      96%, 100% { transform: translate(0); }
    }

    @keyframes glitch-2 {
      0%, 89% { transform: translate(0); }
      90% { transform: translate(4px, 2px) skewX(0.8deg); }
      91% { transform: translate(-3px, -1px); }
      92% { transform: translate(5px, 3px) skewX(-0.5deg); }
      93%, 100% { transform: translate(0); }
    }

    /* Horizontal distortion bars that flash across text */
    .distortion-bar {
      position: absolute;
      left: -5%;
      width: 110%;
      background: #000;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
    }

    .distortion-bar:nth-child(1) {
      top: 38%;
      height: 4px;
      animation: bar-flash 7s 4s infinite;
    }

    .distortion-bar:nth-child(2) {
      top: 55%;
      height: 3px;
      animation: bar-flash 9s 6s infinite;
    }

    .distortion-bar:nth-child(3) {
      top: 72%;
      height: 2px;
      animation: bar-flash 6s 3s infinite;
    }

    @keyframes bar-flash {
      0%, 94% { opacity: 0; transform: translateX(0); }
      95% { opacity: 1; transform: translateX(-8px); }
      95.5% { opacity: 0; transform: translateX(12px); }
      96% { opacity: 0.7; transform: translateX(-4px); }
      96.5%, 100% { opacity: 0; transform: translateX(0); }
    }

    /* Scan lines */
    .scan-lines {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      opacity: 0;
      animation: scan-reveal 0.5s 3.5s forwards;
    }

    @keyframes scan-reveal { to { opacity: 1; } }

    .scan-line-h {
      position: absolute;
      left: 0;
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.02);
    }

    .scan-line-h:nth-child(1) { top: 25%; }
    .scan-line-h:nth-child(2) { top: 50%; }
    .scan-line-h:nth-child(3) { top: 75%; }

    /* Moving scanner */
    .scanner {
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      z-index: 6;
      pointer-events: none;
      animation: scanner-move 8s 4s infinite linear;
    }

    @keyframes scanner-move {
      0% { top: -2px; }
      100% { top: 100%; }
    }

    /* ═══════════════════════════════════════════════════
       3D CANVAS
       ═══════════════════════════════════════════════════ */
    #drone-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
    }

    /* ═══════════════════════════════════════════════════
       UI OVERLAYS
       ═══════════════════════════════════════════════════ */
    .top-nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      opacity: 0;
      animation: fade-in 1s 3s forwards;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 4px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      pointer-events: auto;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: rgba(255,255,255,0.6);
    }

    .nav-links {
      display: flex;
      gap: 32px;
      pointer-events: auto;
    }

    .nav-links a {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-links a:hover { color: #fff; }

    .ui-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 32px 48px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      pointer-events: none;
      opacity: 0;
      animation: fade-in 1s 3.2s forwards;
    }

    @keyframes fade-in {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .ui-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ui-label {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    .ui-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
    }

    .ui-badge .dot {
      width: 6px;
      height: 6px;
      background: #00ff88;
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0,255,136,0); }
    }

    .ui-right {
      display: flex;
      gap: 20px;
      pointer-events: auto;
    }

    .ui-btn {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5);
      padding: 12px 24px;
      cursor: none;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .ui-btn:hover {
      border-color: rgba(255,255,255,0.5);
      color: #fff;
      background: rgba(255,255,255,0.04);
    }

    .ui-btn.primary {
      border-color: rgba(255,255,255,0.3);
      color: #fff;
      background: rgba(255,255,255,0.06);
    }

    .ui-btn.primary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.6);
    }

    /* Scroll hint */
    .scroll-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      animation: fade-in 1s 4s forwards;
    }

    .scroll-hint span {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.2);
    }

    .scroll-line-anim {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
      animation: scroll-pulse 2s infinite;
    }

    @keyframes scroll-pulse {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50% { opacity: 0.8; transform: scaleY(0.5); }
    }

    /* Vignette */
    .vignette {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.5) 75%, rgba(0,0,0,0.85) 100%);
    }

    .bottom-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 180px;
      z-index: 4;
      pointer-events: none;
      background: linear-gradient(to top, rgba(3,3,8,0.7), transparent);
    }

    .top-fade {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100px;
      z-index: 4;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(3,3,8,0.3), transparent);
    }

    /* Particles */
    .particles {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255,255,255,0.12);
      border-radius: 50%;
      animation: float-particle linear infinite;
    }

    @keyframes float-particle {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
    }

    /* ═══════════════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      .hero-text .line-1 { font-size: 56px; letter-spacing: -2px; }
      .hero-text .line-2 { font-size: 22px; letter-spacing: 6px; }
      .top-nav { padding: 20px 24px; }
      .ui-overlay { padding: 20px 24px; flex-direction: column; gap: 16px; align-items: flex-start; }
      .nav-links { display: none; }
      .scroll-hint { display: none; }
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div class="loader" id="loader">
    <div class="loader-text">AR Enterprise</div>
    <div class="loader-bar"></div>
  </div>

  <!-- Custom Cursor -->
  <div class="cursor-ring" id="cursor-ring"></div>
  <div class="cursor-dot" id="cursor-dot"></div>

  <!-- ═══════════ MAIN SCENE ═══════════ -->
  <div class="scene" id="scene">

    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <!-- 3D Drone Canvas -->
    <canvas id="drone-canvas"></canvas>

    <!-- Text Layer -->
    <div class="text-layer" id="text-layer">
      <div class="hero-text" id="hero-text">
        <div class="glitch-wrap">
          <span class="line-1">AR</span>
          <span class="line-2">Enterprise</span>
          <!-- Distortion bars across text -->
          <div class="distortion-bar"></div>
          <div class="distortion-bar"></div>
          <div class="distortion-bar"></div>
        </div>
      </div>
    </div>

    <!-- Scan lines & scanner -->
    <div class="scan-lines">
      <div class="scan-line-h"></div>
      <div class="scan-line-h"></div>
      <div class="scan-line-h"></div>
    </div>
    <div class="scanner"></div>

    <!-- Vignette & fades -->
    <div class="vignette"></div>
    <div class="bottom-fade"></div>
    <div class="top-fade"></div>

    <!-- Top Navigation -->
    <nav class="top-nav">
      <a href="index.html" class="logo">
        <span class="logo-icon">◉</span>
        AR ENTERPRISE
      </a>
      <div class="nav-links">
        <a href="index.html#products">Shop</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
      </div>
    </nav>

    <!-- Bottom UI -->
    <div class="ui-overlay">
      <div class="ui-left">
        <div class="ui-label">Competition Robotics</div>
        <div class="ui-badge">
          <span class="dot"></span>
          Interactive 3D Scene
        </div>
      </div>
      <div class="ui-right">
        <a href="index.html#products" class="ui-btn">Explore ↗</a>
        <a href="index.html#contact" class="ui-btn primary">Order Now →</a>
      </div>
    </div>

    <!-- Scroll Hint -->
    <div class="scroll-hint">
      <span>Scroll</span>
      <div class="scroll-line-anim"></div>
    </div>
  </div>

  <!-- Three.js -->
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>

  <script>
    /* ════════════════════════════════════════════════════════════
       AR ENTERPRISE — Drone Hero Scene v2
       Rebuilt from Spline community "Drone" design
       ════════════════════════════════════════════════════════════ */

    // ─── LOADING ──────────────────────────────────────
    setTimeout(() => document.getElementById('loader').classList.add('hidden'), 2800);

    // ─── CUSTOM CURSOR ────────────────────────────────
    const ring = document.getElementById('cursor-ring');
    const dot = document.getElementById('cursor-dot');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; }, { passive: true });

    (function cursorLoop() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      dot.style.left = mx + 'px';
      dot.style.top = my + 'px';
      requestAnimationFrame(cursorLoop);
    })();

    document.querySelectorAll('a, button, .ui-btn').forEach(el => {
      el.addEventListener('mouseenter', () => {
        ring.style.width = '56px'; ring.style.height = '56px';
        ring.style.borderColor = 'rgba(255,255,255,0.6)';
      });
      el.addEventListener('mouseleave', () => {
        ring.style.width = '40px'; ring.style.height = '40px';
        ring.style.borderColor = 'rgba(255,255,255,0.3)';
      });
    });

    // ─── PARTICLES ────────────────────────────────────
    const pc = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (10 + Math.random() * 18) + 's';
      p.style.animationDelay = (Math.random() * 18) + 's';
      p.style.width = p.style.height = (1 + Math.random() * 1.5) + 'px';
      pc.appendChild(p);
    }

    // ─── TEXT PARALLAX ────────────────────────────────
    const textLayer = document.getElementById('text-layer');
    let tmx = 0, tmy = 0, stmx = 0, stmy = 0;
    document.addEventListener('mousemove', e => {
      tmx = (e.clientX / window.innerWidth - 0.5) * 2;
      tmy = (e.clientY / window.innerHeight - 0.5) * 2;
    }, { passive: true });

    (function pLoop() {
      stmx += (tmx - stmx) * 0.04;
      stmy += (tmy - stmy) * 0.04;
      textLayer.style.transform = `translate(${stmx * -6}px, ${stmy * -4}px)`;
      requestAnimationFrame(pLoop);
    })();

    // ═══════════════════════════════════════════════════
    // THREE.JS DRONE — High-quality metallic drone
    // ═══════════════════════════════════════════════════
    (function initDrone() {
      if (typeof THREE === 'undefined') { setTimeout(initDrone, 100); return; }

      const canvas = document.getElementById('drone-canvas');
      const W = window.innerWidth;
      const H = window.innerHeight;

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(W, H);
      renderer.setClearColor(0x000000, 0);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.4;
      if ('outputColorSpace' in renderer) renderer.outputColorSpace = THREE.SRGBColorSpace || 'srgb';

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 2000);
      camera.position.set(0, 50, 220);
      camera.lookAt(0, 10, 0);

      // ── ENVIRONMENT MAP (fake reflections) ──
      const pmrem = new THREE.PMREMGenerator(renderer);
      const envScene = new THREE.Scene();
      // Create gradient environment
      const envGeo = new THREE.SphereGeometry(100, 32, 32);
      const envMat = new THREE.ShaderMaterial({
        side: THREE.BackSide,
        uniforms: {},
        vertexShader: `
          varying vec3 vWorldPosition;
          void main() {
            vec4 worldPos = modelMatrix * vec4(position, 1.0);
            vWorldPosition = worldPos.xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vWorldPosition;
          void main() {
            float y = normalize(vWorldPosition).y;
            vec3 top = vec3(0.02, 0.02, 0.04);
            vec3 mid = vec3(0.04, 0.04, 0.06);
            vec3 bot = vec3(0.01, 0.01, 0.015);
            vec3 col = mix(bot, mid, smoothstep(-1.0, 0.0, y));
            col = mix(col, top, smoothstep(0.0, 1.0, y));
            // Add subtle bright spots for reflections
            float spot1 = smoothstep(0.8, 1.0, dot(normalize(vWorldPosition), normalize(vec3(1.0, 0.8, 0.5))));
            float spot2 = smoothstep(0.85, 1.0, dot(normalize(vWorldPosition), normalize(vec3(-0.6, 0.5, -0.8))));
            col += vec3(0.3) * spot1 + vec3(0.15, 0.15, 0.2) * spot2;
            gl_FragColor = vec4(col, 1.0);
          }
        `
      });
      envScene.add(new THREE.Mesh(envGeo, envMat));
      const envRT = pmrem.fromScene(envScene, 0.04);
      scene.environment = envRT.texture;

      // ── LIGHTS ──
      scene.add(new THREE.AmbientLight(0xffffff, 0.12));

      const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
      keyLight.position.set(60, 100, 120);
      scene.add(keyLight);

      const rimLight = new THREE.DirectionalLight(0x8899cc, 0.8);
      rimLight.position.set(-80, 60, -60);
      scene.add(rimLight);

      const underLight = new THREE.PointLight(0x445566, 1.2, 300);
      underLight.position.set(0, -60, 40);
      scene.add(underLight);

      const accentLight = new THREE.PointLight(0x334455, 2, 400);
      accentLight.position.set(100, 30, -80);
      scene.add(accentLight);

      // ── MATERIALS ──
      const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x0a0a0a,
        metalness: 0.98,
        roughness: 0.04,
      });

      const darkMat = new THREE.MeshStandardMaterial({
        color: 0x050505,
        metalness: 0.95,
        roughness: 0.08,
      });

      const glossMat = new THREE.MeshStandardMaterial({
        color: 0x111111,
        metalness: 1.0,
        roughness: 0.01,
      });

      // ── DRONE GROUP ──
      const drone = new THREE.Group();

      // Central body — rounded box
      const bodyGeo = new THREE.CapsuleGeometry(9, 24, 16, 32);
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.rotation.z = Math.PI / 2;
      body.scale.set(1, 0.5, 0.65);
      drone.add(body);

      // Top canopy (glass-like)
      const canopyGeo = new THREE.SphereGeometry(7, 20, 12, 0, Math.PI * 2, 0, Math.PI * 0.45);
      const canopyMat = new THREE.MeshPhysicalMaterial({
        color: 0x0a0a0a,
        metalness: 0.3,
        roughness: 0.01,
        clearcoat: 1.0,
        clearcoatRoughness: 0.02,
        transparent: true,
        opacity: 0.85,
      });
      const canopy = new THREE.Mesh(canopyGeo, canopyMat);
      canopy.position.set(5, 4, 0);
      canopy.scale.set(0.8, 0.45, 0.75);
      drone.add(canopy);

      // Bottom plate
      const platGeo = new THREE.BoxGeometry(30, 1.5, 15);
      const plate = new THREE.Mesh(platGeo, darkMat);
      plate.position.set(0, -3.5, 0);
      plate.scale.set(1, 1, 1);
      drone.add(plate);

      // Camera lens
      const lensGeo = new THREE.SphereGeometry(2, 12, 12);
      const lensMat = new THREE.MeshPhysicalMaterial({
        color: 0x111122,
        metalness: 0.4,
        roughness: 0.0,
        clearcoat: 1.0,
        clearcoatRoughness: 0.0,
      });
      const lens = new THREE.Mesh(lensGeo, lensMat);
      lens.position.set(13, -1, 0);
      lens.scale.set(0.7, 0.5, 0.7);
      drone.add(lens);

      // ── 4 ARMS + MOTORS + ROTORS ──
      const armData = [
        { x: 22, z: 22, angle: Math.PI / 4 },
        { x: 22, z: -22, angle: -Math.PI / 4 },
        { x: -22, z: 22, angle: (Math.PI * 3) / 4 },
        { x: -22, z: -22, angle: -(Math.PI * 3) / 4 },
      ];

      const rotors = [];

      armData.forEach((arm, i) => {
        // Arm strut
        const armLen = Math.sqrt(arm.x * arm.x + arm.z * arm.z) * 0.5;
        const armGeo = new THREE.BoxGeometry(armLen, 2.2, 3.2);
        const armMesh = new THREE.Mesh(armGeo, bodyMat);
        armMesh.position.set(arm.x * 0.5, 0.5, arm.z * 0.5);
        armMesh.rotation.y = arm.angle;
        drone.add(armMesh);

        // Motor housing
        const motorGeo = new THREE.CylinderGeometry(3.8, 4.2, 4.5, 20);
        const motor = new THREE.Mesh(motorGeo, glossMat);
        motor.position.set(arm.x, 1.5, arm.z);
        drone.add(motor);

        // Motor cap
        const capGeo = new THREE.CylinderGeometry(2.5, 3.8, 1.2, 20);
        const cap = new THREE.Mesh(capGeo, darkMat);
        cap.position.set(arm.x, 4, arm.z);
        drone.add(cap);

        // Prop guard ring
        const guardGeo = new THREE.TorusGeometry(12, 0.8, 6, 40);
        const guard = new THREE.Mesh(guardGeo, darkMat);
        guard.position.set(arm.x, 3, arm.z);
        guard.rotation.x = Math.PI / 2;
        drone.add(guard);

        // Rotor blades — 2-blade prop
        const bladeMat = new THREE.MeshStandardMaterial({
          color: 0x1a1a1a,
          metalness: 0.8,
          roughness: 0.15,
          transparent: true,
          opacity: 0.5,
        });

        const bladeGroup = new THREE.Group();
        for (let b = 0; b < 2; b++) {
          const bladeGeo = new THREE.BoxGeometry(20, 0.3, 2.4);
          const blade = new THREE.Mesh(bladeGeo, bladeMat);
          blade.rotation.y = (Math.PI / 2) * b;
          bladeGroup.add(blade);
        }
        bladeGroup.position.set(arm.x, 4.5, arm.z);
        drone.add(bladeGroup);
        rotors.push(bladeGroup);
      });

      // ── LANDING GEAR ──
      const skidMat = darkMat;
      [-7, 7].forEach(z => {
        // Horizontal skid
        const skidGeo = new THREE.CapsuleGeometry(0.5, 14, 4, 8);
        const skid = new THREE.Mesh(skidGeo, skidMat);
        skid.position.set(0, -9, z);
        skid.rotation.z = Math.PI / 2;
        drone.add(skid);

        // Vertical struts
        [-5, 5].forEach(x => {
          const strutGeo = new THREE.CylinderGeometry(0.4, 0.4, 5, 6);
          const strut = new THREE.Mesh(strutGeo, skidMat);
          strut.position.set(x, -6.5, z);
          // Slight angle
          strut.rotation.z = x > 0 ? -0.08 : 0.08;
          drone.add(strut);
        });
      });

      // ── LED INDICATORS ──
      const ledGeo = new THREE.SphereGeometry(0.5, 8, 8);
      [
        { pos: [22, 1, 22], color: 0x00cc44 },
        { pos: [22, 1, -22], color: 0x00cc44 },
        { pos: [-22, 1, 22], color: 0xcc2222 },
        { pos: [-22, 1, -22], color: 0xcc2222 },
      ].forEach(led => {
        const m = new THREE.MeshBasicMaterial({ color: led.color });
        const mesh = new THREE.Mesh(ledGeo, m);
        mesh.position.set(...led.pos);
        drone.add(mesh);
      });

      // Scale + position the drone
      drone.scale.setScalar(2.4);
      drone.position.set(0, 30, 0);
      drone.rotation.set(-0.2, -0.4, 0);
      scene.add(drone);

      // ── GROUND REFLECTION PLANE ──
      const reflGeo = new THREE.PlaneGeometry(200, 200);
      const reflMat = new THREE.MeshStandardMaterial({
        color: 0x111111,
        metalness: 0.9,
        roughness: 0.3,
        transparent: true,
        opacity: 0.08,
      });
      const refl = new THREE.Mesh(reflGeo, reflMat);
      refl.rotation.x = -Math.PI / 2;
      refl.position.y = -60;
      scene.add(refl);

      // ── SUBTLE LIGHT CONE (volumetric fake) ──
      const coneGeo = new THREE.ConeGeometry(45, 80, 32, 1, true);
      const coneMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.012,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
      });
      const cone = new THREE.Mesh(coneGeo, coneMat);
      cone.position.set(0, 70, 0);
      cone.rotation.x = Math.PI;
      scene.add(cone);

      // ── DUST PARTICLES ──
      const dustCount = 600;
      const dPos = new Float32Array(dustCount * 3);
      for (let i = 0; i < dustCount; i++) {
        dPos[i * 3]     = (Math.random() - 0.5) * 700;
        dPos[i * 3 + 1] = (Math.random() - 0.5) * 500;
        dPos[i * 3 + 2] = (Math.random() - 0.5) * 400 - 80;
      }
      const dustGeo = new THREE.BufferGeometry();
      dustGeo.setAttribute('position', new THREE.BufferAttribute(dPos, 3));
      const dustMat = new THREE.PointsMaterial({
        color: 0xffffff, size: 0.8, transparent: true, opacity: 0.12, sizeAttenuation: true,
      });
      scene.add(new THREE.Points(dustGeo, dustMat));

      // ── MOUSE TRACKING ──
      let mouseX = 0, mouseY = 0, sMouseX = 0, sMouseY = 0;
      document.addEventListener('mousemove', e => {
        mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
        mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
      }, { passive: true });

      // ── ANIMATION LOOP ──
      let t = 0;
      function animate() {
        t += 0.016;

        sMouseX += (mouseX - sMouseX) * 0.025;
        sMouseY += (mouseY - sMouseY) * 0.025;

        // Drone cursor tracking — smooth tilt + position
        drone.rotation.y = -0.4 + sMouseX * 0.5;
        drone.rotation.x = -0.2 + sMouseY * -0.2;
        drone.rotation.z = sMouseX * -0.1;

        drone.position.x = sMouseX * 20;
        drone.position.z = sMouseY * -8;

        // Hover bob
        drone.position.y = 30 + Math.sin(t * 1.8) * 4 + Math.sin(t * 3.2) * 1.5;

        // Rotor spin (fast!)
        rotors.forEach((r, i) => {
          r.rotation.y += 0.4 + (i * 0.08);
        });

        // LED blink
        const blink = Math.sin(t * 4) > 0.3;

        // Subtle camera follow
        camera.position.x = sMouseX * 6;
        camera.position.y = 50 + sMouseY * -4;
        camera.lookAt(0, 8, 0);

        // Light follow
        accentLight.position.x = 100 + sMouseX * 40;
        accentLight.position.y = 30 + sMouseY * 20;

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      animate();

      // Resize
      window.addEventListener('resize', () => {
        const w = window.innerWidth, h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }, { passive: true });
    })();
  </script>
</body>
</html>
